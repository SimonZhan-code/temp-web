# =============================================================================
# FULL-SPAN 8x H100 training config: V-MPO value-head best-of-N in the REAL sim,
# NL prompts — the large-scale version of the validated kitchen4_composition_vmpo_sim100.
# =============================================================================
# Same mechanism validated on the 2-GPU node (value head ranks candidates, rollouts
# in the real MuJoCo sim, NOT the Wan world model), scaled to 8x H100 full throughput:
#   - NL prompts (env/kitchen4_ltl_composition_nl) — the AP-prompt variant zeroes out
#     reward (AP-OOD); use NL. depth-1 curriculum (composition.max_depth: 1).
#   - value-head best-of-N at eval (best_of_n_scorer=value default, best_of_n_mode=eval),
#     value_after_vlm=False so the value is action-conditioned and CAN discriminate.
#   - detach_critic_input=True so the frozen SFT policy stays frozen (critic-only V-MPO).
#   - d12 eval (env/kitchen4_compositional_eval_nl_d12) -> per-depth eval/*_d1 / *_d2.
# This is the clean controlled counterpart to kitchen4_composition_ppo_nl_frozen
# (identical env/depth/eval; PPO trains policy+critic by gradient, this trains ONLY the
# critic and steers by value-BoN). If eval/success_once_d1 climbs, the value head learns
# to rank; then WM precision is the only remaining gap for the imagination path.
#
# LAUNCH (8x H100 SXM, single node):
#   sudo sysctl -w kernel.yama.ptrace_scope=0       # collocated CUDA-IPC weight sync
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   export WANDB_API_KEY=...
#   # set rollout.model.model_path / actor.model.model_path to the Pi05-LIBERO-SFT ckpt
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_nl_8xh100
# Unprivileged container (no ptrace): use the disaggregated placement block below.
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition_nl@env.train         # NL prompts (AP zeroes out reward)
  - env/kitchen4_compositional_eval_nl_d12@env.eval    # depth-1&2 blend, per-depth d1/d2 metrics
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    # Collocated on all 8 GPUs (max throughput). Requires kernel.yama.ptrace_scope=0.
    actor,env,rollout: all
    # --- Disaggregated alternative (no ptrace; NCCL weight sync) for unprivileged nodes,
    # --- and drop env.train.total_num_envs to a multiple of the actor GPU count:
    # actor: 0-3
    # rollout: 4-7
    # env: 0-3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_vmpo_nl_valuebon_8xh100"
    logger_backends: ["tensorboard", "wandb"]   # set WANDB_API_KEY (or `wandb login`)

  max_epochs: 500
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 50         # eval every 50 epochs (and at train end)
  eval_at_start: True            # epoch-0 (untrained critic) baseline eval
  save_interval: 50              # checkpoint every 50 epochs (divisible by val_check_interval)
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 8               # rollout passes collected per training step
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4                # optimizer passes over the rollout buffer
  # --- V-MPO single-critic method (critic-only; policy frozen) ---
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 256          # 32 parallel envs / GPU across 8 cards (dense success sampling)
    max_episode_steps: 500       # full LIBERO horizon
    max_steps_per_rollout_epoch: 500   # divisible by num_action_chunks (=10)
    reward_coef: ${algorithm.reward_coef}
    composition:
      max_depth: 1               # CURRICULUM: single-subgoal only (achievable by frozen SFT).
                                 # WITHOUT this the env samples depth 1-3 and the unachievable
                                 # depth-2/3 tasks zero out reward.
  eval:
    total_num_envs: 32           # blended depth-1/2 fixed init states
    auto_reset: True
    ignore_terminations: False   # terminate on success -> eval/episode_len = time-to-success
    max_episode_steps: 400       # blended depth-2 tasks need a longer horizon (400/10=40)
    max_steps_per_rollout_epoch: 400
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048        # global % (micro_batch_size * actor_world_size) == 0
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: False     # value depends on the sampled action -> best-of-N can discriminate
      detach_critic_input: True  # CRITICAL: critic grad must NOT flow into the shared action-expert
                                 # trunk or it corrupts the frozen SFT policy (critic-only V-MPO)
      best_of_n: 8               # eval-time value-guided selection (the policy-improvement mechanism)
      best_of_n_scorer: value    # the critic's value head ranks candidates (the default)
      best_of_n_mode: eval       # BoN at eval only; training rollouts sample normally (default)
      best_of_n_eta: 1.0         # η* init; synced from the actor's V-MPO temperature dual
      best_of_n_lambda: 0.0      # BoN score = V_{r̃}/η*

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"   # pi0.5 fits on one 80 GB H100 -> data-parallel (fastest)
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
