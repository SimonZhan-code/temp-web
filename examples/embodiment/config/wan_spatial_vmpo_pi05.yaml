# =============================================================================
# pi0.5 + V-MPO with the Wan WORLD MODEL as the rollout env (train + eval in
# imagination) + best-of-N BRANCHING: per decision pi0.5 proposes N candidate
# 8-action chunks (num_action_chunks: 8 to match the WM), the WM generates every
# candidate's future, the ResNet reward model scores them, and the argmax branch
# COMMITS as the transition (selection is the step; no restore in imagination).
# V-MPO trains the critic on the selection-improved behavior policy.
#
# Setting: libero_spatial (the pretrained WM's domain) — NOT KITCHEN_SCENE4.
#
# LAUNCH (2x H100: actor GPU0; rollout pi0.5 + both WM servers GPU1):
#   1. start the two rollout servers (wanspike venv, see env/wan_spatial_wm.yaml)
#   2. ulimit -n 65535; export OMP_NUM_THREADS=1 ...; wandb key
#   3. bash examples/embodiment/run_embodiment.sh wan_spatial_vmpo_pi05
# VRAM budget: B*N <= 32 per generation (4 envs x 8 candidates).
# =============================================================================
defaults:
  - env/wan_spatial_wm@env.train
  - env/wan_spatial_wm@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0
    rollout: 1
    env: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "wan_spatial_vmpo_pi05"
    logger_backends: ["tensorboard", "wandb"]
    max_eval_videos: 0

  max_epochs: 300
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 10
  eval_at_start: True
  save_interval: 50
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 2

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 2
  adv_type: vmpo                 # required for best_of_n_mode=train_eval
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 4            # B*N = 4x4 = 16 gen batch (GPU1 shared with pi0.5 + eval server)
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 4
    is_eval: True
    wm:
      ipc_dir: /dev/shm/wanroll_eval
      ipc_timeout_s: 600
      chunk: 8
      state_dim: 8

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 64
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    num_action_chunks: 8         # MATCH the WM chunk (pi0.5 predicts a longer
                                 # horizon; the first 8 actions are executed/judged)
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: True      # state value; the WM's RM is the selector
      detach_critic_input: True
      best_of_n: 4               # candidates branched per decision (B*N=16 gen batch, ~30GiB peak)
      best_of_n_scorer: external # candidates -> env (the WM commits the winner)
      best_of_n_mode: train_eval # BoN behavior policy for training AND eval
      best_of_n_eta: 1.0
      best_of_n_lambda: 0.0

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
