# =============================================================================
# V-MPO + ORACLE best-of-N: KITCHEN_SCENE4 compositions, canonical NL prompts.
# The simulator itself scores the N candidate chunks (perfect world model): per
# decision the env snapshots MuJoCo state, rolls out every candidate, scores by
# TRUE subgoal reach events, restores, and executes the argmax
# (LiberoCompositionEnv.oracle_chunk_step). This measures the CEILING of
# selection-based improvement for the frozen policy — the gate for the Wan
# world-model fine-tune, which will plug into the same external-scorer interface.
#
# ARMS (sed one knob):
#   1. CEILING (no training):   runner.only_eval: True   -> eval-only oracle BoN vs
#      the plain-SFT and value-BoN baselines (existing configs).
#   2. V-MPO + oracle BoN:      runner.only_eval: False, openpi.best_of_n_mode:
#      train_eval -> selection-improved behavior policy + critic-only V-MPO
#      training (the actual method, oracle standing in for the WM).
# Watch: eval/success_once (+_d1/_d2), env/bon_disc_frac (fraction of decisions
# where the oracle discriminated among candidates).
#
# LAUNCH (8x H100; on 2-GPU vast use disaggregated placement + <=8 envs/worker):
#   sudo sysctl -w kernel.yama.ptrace_scope=0
#   ulimit -n 65535
#   export OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 OPENBLAS_NUM_THREADS=1
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_oraclebon
# Set the SFT checkpoint path (rollout.model.model_path / actor.model.model_path).
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition_nl@env.train
  - env/kitchen4_compositional_eval_nl_d12@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all       # collocated on all 8 GPUs (needs ptrace_scope=0)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_vmpo_oraclebon"
    logger_backends: ["tensorboard", "wandb"]
    max_eval_videos: 4

  max_epochs: 500
  max_steps: -1

  only_eval: False               # ARM 1 (ceiling): set True -> eval-only oracle BoN
  eval_policy_path: null
  val_check_interval: 10
  eval_at_start: True            # epoch-0 eval IS the ceiling number when training
  save_interval: 30
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 2
  adv_type: vmpo                 # REQUIRED for best_of_n_mode=train_eval (guarded)
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 256          # 32 envs / GPU across 8 cards (vast: <=8 per worker!)
    max_episode_steps: 250
    max_steps_per_rollout_epoch: 250   # 25 chunks/epoch; depth-1 finishes well under 250
    reward_coef: ${algorithm.reward_coef}
    composition:
      max_depth: 1               # depth-1 (matched to the PPO b0 baselines)
      steps_per_subgoal: 250     # episode cap scales with chain depth (expansion-safe)
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: False   # eval/episode_len = time-to-success
    max_episode_steps: 400       # blended depth-2 tasks need the longer horizon
    max_steps_per_rollout_epoch: 400
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 512
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: True      # STATE value: the value head is no longer the
                                 # selector (oracle/WM scores candidates) — critic
                                 # trains as V(s) of the selection-improved policy.
      detach_critic_input: True
      best_of_n: 8               # candidates per decision
      best_of_n_scorer: external # env-side oracle selection (candidates -> env)
      best_of_n_mode: eval       # ARM 2: train_eval (BoN behavior policy + V-MPO)
      best_of_n_eta: 1.0
      best_of_n_lambda: 0.0

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
