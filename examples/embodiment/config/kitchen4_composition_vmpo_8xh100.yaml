# =============================================================================
# FULL-SPAN training config: V-MPO + KITCHEN_SCENE4 random ordered AP compositions
# on 8x H100 (80 GB) — single node.
# =============================================================================
# Train: pi0.5 (frozen VLM backbone, train_expert_only) with a learned value head +
#   V-MPO temperature; per-episode random ORDERED AP composition for KITCHEN_SCENE4
#   (env/kitchen4_ltl_composition), prompted with the current subgoal in AP format.
# Eval: SAME-SCENE LDBA eval on the KITCHEN_SCENE4 compositional task, built from the
#   LIBERO-Max canonical LTL + prebuilt-HOA cache (no online Rabinizer), prompted in the
#   same AP format (env/kitchen4_eval_ldba_samescene).
# Best-of-N (eval-time) IS active here: best_of_n lives under actor.model.openpi and
#   value_after_vlm=False, so the value depends on the sampled action.
#
# -----------------------------------------------------------------------------
# LAUNCH (8x H100 SXM, single node):
#   # 1) one-time, needs root — collocated CUDA-IPC weight sync requires this:
#   sudo sysctl -w kernel.yama.ptrace_scope=0
#   # 2) headless MuJoCo render (point at the NVIDIA EGL vendor ICD):
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   # 3) (only on non-NVLink/PCIe nodes) NCCL_P2P_DISABLE=1 — H100 SXM has NVLink, omit.
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_8xh100
#
# Set the SFT checkpoint path (rollout.model.model_path / actor.model.model_path).
# If your cluster can't set ptrace_scope (unprivileged container), use the disaggregated
# placement block commented out under `cluster.component_placement` (NCCL weight sync,
# no ptrace) — and split env/256 across the actor GPUs.
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition@env.train
  - env/kitchen4_eval_ldba_samescene@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    # Collocated on all 8 GPUs (max throughput; rollout is placed strided for fast
    # cudaIPC weight sync). Requires kernel.yama.ptrace_scope=0 (see header).
    actor,env,rollout: all
    # --- Disaggregated alternative (no ptrace needed; NCCL weight sync). Use INSTEAD
    # --- of the line above on unprivileged nodes, and drop env.train.total_num_envs to
    # --- a multiple of the actor GPU count:
    # actor: 0-3
    # rollout: 4-7
    # env: 0-3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_composition_vmpo_8xh100"
    logger_backends: ["tensorboard", "wandb"]   # set WANDB_API_KEY (or `wandb login`)

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 50         # eval every 50 epochs (and at train end)
  eval_at_start: True            # epoch-0 (untrained) baseline eval
  save_interval: 50              # checkpoint every 50 epochs (divisible by val_check_interval)
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 8               # rollout passes collected per training step
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4                # optimizer passes over the rollout buffer
  # --- V-MPO single-critic method ---
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0               # frozen policy: no entropy gradient into the logits
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97               # κ→1 for the sparse reach signal

  # V-MPO temperature dual + safety multiplier. Reach-only here (no avoid set ⇒
  # c_hazard ≡ 0), so safety_mode/β are inert but wired for a future violation cost.
  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 256          # 32 parallel envs / GPU across 8 cards
    max_episode_steps: 500       # full LIBERO horizon (KITCHEN multi-subgoal tasks)
    max_steps_per_rollout_epoch: 500   # must be divisible by num_action_chunks (=10)
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 50           # the KITCHEN_SCENE4 compositional task x 50 init states
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048        # global % (micro_batch_size * actor_world_size) == 0
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False         # reach-only V-MPO (cost port wired but inert)
    openpi:
      value_after_vlm: False     # value depends on the sampled action -> best-of-N can discriminate
      best_of_n: 8               # eval-time best-of-N (best_of_n MUST be under openpi)
      best_of_n_eta: 1.0         # η* init; synced from the actor's V-MPO temperature dual
      best_of_n_lambda: 0.0      # BoN score = V_{r̃}/η*

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"   # pi0.5 fits on one 80 GB H100 -> data-parallel (fastest).
                                    # Switch to "full_shard" + cpu_offload only if you unfreeze
                                    # the VLM and run out of memory.
    gradient_checkpointing: False   # set True if you raise micro_batch_size / unfreeze
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
