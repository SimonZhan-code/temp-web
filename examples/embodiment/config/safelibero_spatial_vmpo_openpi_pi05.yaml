# Single-critic on-policy V-MPO latent steering on SafeLIBERO-Spatial (reach-avoid).
# Reach-avoid job: avoid set present -> cost signal active -> scalarized reward
#   r̃ = r_reach - λ·c_hazard. Frozen pi0.5 backbone; only the single value head V_{r̃},
# temperature η*, and safety multiplier λ are learned. Best-of-N selection scores V_{r̃}/η*.
defaults:
  - env/safelibero_spatial@env.train
  - env/safelibero_spatial@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "safelibero_spatial_vmpo_openpi_pi05"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: -1
  save_interval: 40
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 8
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4
  # --- V-MPO single-critic method ---
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0          # keep the policy frozen (no entropy gradient into logits)
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 1.0           # κ=1: Monte-Carlo return-to-segment-terminal (sparse reach)

  # V-MPO temperature dual + safety multiplier
  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    per_subgoal_adv_norm: True   # normalize advantages within each subgoal for the E-step
    safety_mode: fixed       # fixed (default) | adaptive
    beta: 1.0                # fixed-mode constant λ
    lambda_init: 0.0         # adaptive-mode init
    epsilon_1: 0.0           # adaptive-mode cost budget (J_c ≤ ε₁)
    alpha_lambda: 0.05       # adaptive-mode dual-ascent step
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 64
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  # Override the default values in model/pi0_5
  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    model_type: "openpi"
    add_value_head: True         # single critic V_{r̃} (safety penalty lives in the reward)
    best_of_n: 8                 # eval-time best-of-N improvement
    best_of_n_eta: 1.0           # η* init; synced from the actor's V-MPO temperature dual
    # openpi specific parameters
    openpi:
      value_after_vlm: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
