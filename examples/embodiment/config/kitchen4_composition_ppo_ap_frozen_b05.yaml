# =============================================================================
# PPO (policy + critic) on KITCHEN_SCENE4 depth-1 subgoal compositions, AP prompt.
# REACH-AVOID variant: avoid_beta=0.5 (reach reward -= 0.5 per un-commanded goal-AP
# toggle; eval stays penalty-free). Otherwise identical to the ap_frozen baseline.
# VLM FROZEN variant (train_expert_only=True): trains the action expert + value head
# by policy gradient (unlike V-MPO's critic-only + best-of-N). 8x H100, single node.
# =============================================================================
# Purpose: isolate whether the subgoal-decomposition / goal-conditioned formulation is
#   learnable when the POLICY is actually trained (PPO), vs V-MPO Option A (frozen policy
#   + eval-time best-of-N) which isn't steering. Same env / tasks / prompts as the V-MPO
#   fast configs; only the algorithm (config) differs. V-MPO code/configs untouched.
# Mode switch: this is PPO (adv_type=gae, loss_type=actor_critic); the *_vmpo_* configs
#   are V-MPO. Launch a different config-name to switch training mode.
#
# LAUNCH (8x H100 SXM, single node):
#   sudo sysctl -w kernel.yama.ptrace_scope=0            # collocated CUDA-IPC weight sync
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_ppo_ap_frozen
# Set the SFT checkpoint path (rollout.model.model_path / actor.model.model_path).
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition@env.train
  - env/kitchen4_compositional_eval_d12@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all       # collocated on all 8 GPUs (needs ptrace_scope=0)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_composition_ppo_ap_frozen_b05"
    logger_backends: ["tensorboard", "wandb"]
    max_eval_videos: 4

  max_epochs: 500
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 10         # eval every 10 epochs (and at train end)
  eval_at_start: True            # epoch-0 (untrained) baseline eval
  save_interval: 30
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 4
  # --- PPO (trains policy + critic). No vmpo block -> V-MPO temp/lambda are no-ops. ---
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0                    # bare PPO (no reference-policy anchor)
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 256          # 32 envs / GPU across 8 cards
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500   # divisible by num_action_chunks (=10)
    reward_coef: ${algorithm.reward_coef}
    composition:
      max_depth: 1               # depth-1 (matched to the V-MPO experiments)
      avoid_beta: 0.5          # AVOID: -0.5 per un-commanded goal-AP toggle (see PPO_EXPERIMENTS.md)
  eval:
    total_num_envs: 16
    auto_reset: True
    ignore_terminations: False   # terminate on success -> eval/episode_len = time-to-success
    max_episode_steps: 400       # blended depth-2 tasks need a longer horizon
    max_steps_per_rollout_epoch: 400
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 1024        # bumped for speed (spare mem). global % (micro*world)==0; reduce if OOM
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      train_expert_only: True    # FROZEN VLM: train action expert + value head only
      value_after_vlm: True      # PPO state value (from the VLM prefix, action-independent)

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"   # frozen VLM fits on one 80GB H100 (data-parallel)
    gradient_checkpointing: False   # openpi does NOT support gradient checkpointing
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
