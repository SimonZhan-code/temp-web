# =============================================================================
# SUPER-TOY PPO smoke test: KITCHEN_SCENE4 depth-1, NL prompt, FULL UNFREEZE (no_shard).
# Purpose: mechanically validate the PPO training loop end-to-end (rollout -> GAE ->
#   actor_critic loss -> optimizer step -> eval) with the smallest possible workload.
#   NOT for learning — just "does the pipeline run".
#
# HARDWARE: a 2-GPU single node (DISAGGREGATED placement: actor GPU0, rollout GPU1).
#   Disaggregated uses NCCL weight sync and does NOT need ptrace_scope=0 / CUDA-IPC, so it
#   runs inside unprivileged vast.ai containers (where ptrace_scope is read-only). A 1-GPU
#   node CANNOT run this (collocated needs ptrace, unavailable in vast containers).
#   Still requires the openpi venv + LIBERO-Max + the SFT checkpoint installed.
#
# LAUNCH (2-GPU node):
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   export NCCL_P2P_DISABLE=1   # only on PCIe (non-NVLink) nodes
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_ppo_nl_toy_unfrozen
# Set the SFT checkpoint path (rollout.model.model_path / actor.model.model_path).
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition_nl@env.train
  - env/kitchen4_compositional_eval_nl_depth1@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0          # GPU 0
    rollout: 1        # GPU 1  (different device -> NCCL weight sync, no ptrace/IPC)
    env: 0            # env sim/render shares GPU 0 (obs are CPU tensors)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_composition_ppo_nl_toy_unfrozen"
    logger_backends: ["tensorboard", "wandb"]
    max_eval_videos: 1

  max_epochs: 3                  # toy: a couple of training steps
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 2          # eval at step 2 (+ eval_at_start)
  eval_at_start: True
  save_interval: 100             # toy: don't checkpoint
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1                # toy: single optimizer pass
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 2            # toy: 2 envs
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50    # divisible by num_action_chunks (=10)
    reward_coef: ${algorithm.reward_coef}
    composition:
      max_depth: 1
  eval:
    total_num_envs: 2
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1           # global % (micro_batch_size * actor_world_size) == 0
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      train_expert_only: False   # FULL UNFREEZE (no_shard) — validates the unfrozen forward
      value_after_vlm: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False   # openpi does NOT support gradient checkpointing
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
