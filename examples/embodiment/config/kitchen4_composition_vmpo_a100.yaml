# Collocated single-GPU smoke config for an 80 GB GPU (e.g. A100-80GB).
# actor+env+rollout share ONE GPU -> CUDA-IPC weight sync (needs kernel.yama.ptrace_scope=0).
# 80 GB removes the memory wall, so NONE of the offload/checkpointing hacks from the
# 24 GB smoke config are needed. Launch with CUDA_VISIBLE_DEVICES=0 so only one GPU is
# visible (forces the clean same-device IPC path).
#
# Launch:
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   CUDA_VISIBLE_DEVICES=0 bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_a100
defaults:
  - env/kitchen4_ltl_composition@env.train
  - env/kitchen4_compositional_eval@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "kitchen4_composition_vmpo_a100"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: -1
  save_interval: 999
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1
  # --- V-MPO single-critic method ---
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 8
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "${oc.env:REPO_PATH}/models/Pi05-LIBERO-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 8
  seed: 42
  enable_offload: False

  model:
    model_path: "${oc.env:REPO_PATH}/models/Pi05-LIBERO-SFT"
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: False     # value depends on the action -> best-of-N can discriminate
      best_of_n: 4                # best_of_n MUST be under openpi (get_model only reads openpi.*)
      best_of_n_eta: 1.0
      best_of_n_lambda: 0.0

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
