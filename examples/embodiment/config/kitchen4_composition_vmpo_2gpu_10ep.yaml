# 2-GPU DISAGGREGATED 10-epoch run for V-MPO + KITCHEN_SCENE4 AP compositions,
# with LDBA-based eval on KITCHEN_SCENE3 at epoch 0 and epoch 10, and wandb logging.
# Actor on GPU 0, rollout on GPU 1 -> the actor<->rollout weight sync goes over NCCL
# (cross-device) instead of CUDA-IPC, so it needs NO kernel.yama.ptrace_scope change.
# This is the path that works in an unprivileged container (e.g. vast.ai) on a 2-GPU box.
#
# Each GPU holds one full model copy (actor ~15-19 GB incl. optimizer; rollout ~7 GB),
# so ~24 GB/GPU is comfortable WITHOUT the aggressive offload knobs the single-GPU
# smoke config needed. If your cards are smaller (<=16 GB), re-enable enable_offload /
# cpu_offload / gradient_checkpointing as in kitchen4_composition_vmpo_smoke.yaml.
#
# Launch (still needs the EGL vendor fix for headless render):
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_2gpu
defaults:
  - env/kitchen4_ltl_composition@env.train
  - env/kitchen4_eval_ldba_scene3@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0          # GPU 0
    rollout: 1        # GPU 1  (different device -> NCCL weight sync, no ptrace/IPC)
    env: 0            # env sim/render shares GPU 0 (obs are CPU tensors)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_10ep_best_of_n_active"
    logger_backends: ["tensorboard", "wandb"]   # set WANDB_API_KEY (or `wandb login`) on the box

  max_epochs: 10
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 10        # eval at epoch 10 (= train end)
  save_interval: -1
  eval_at_start: True            # also eval at epoch 0 (untrained baseline)
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1
  # --- V-MPO single-critic method ---
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 4               # a few envs (plenty of GPU memory across 2 cards)
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120
    reward_coef: ${algorithm.reward_coef}
  eval:
    total_num_envs: 4
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 120
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "${oc.env:REPO_PATH}/models/Pi05-LIBERO-SFT"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 4            # global % (micro * actor_world_size) == 0
  seed: 42
  enable_offload: False

  model:
    model_path: "${oc.env:REPO_PATH}/models/Pi05-LIBERO-SFT"
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: False     # value depends on the action -> best-of-N can discriminate
      best_of_n: 2                # best_of_n MUST be under openpi (get_model only reads openpi.*)
      best_of_n_eta: 1.0
      best_of_n_lambda: 0.0

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"   # single GPU per actor -> no sharding needed
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
