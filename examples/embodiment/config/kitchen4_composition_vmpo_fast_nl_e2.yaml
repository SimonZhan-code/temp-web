# =============================================================================
# FAST TUNING config: V-MPO + KITCHEN_SCENE4 random ordered compositions, NATURAL-
# LANGUAGE prompt. 8x H100 (80 GB), single node.
# =============================================================================
# Purpose: a cheap, fast iteration loop (target ~3-5 min/step vs ~60 min in the full
#   8xh100 config) to TEST THE HYPOTHESIS that the AP-format prompt was OOD for the SFT
#   checkpoint and is why reward never fired. Here the current subgoal is rendered as a
#   natural-language instruction (env.*.composition.prompt_style=nl). Watch env/success_once:
#   if it lifts off zero, NL is the fix; if it stays zero, the bug is in the env/label
#   wiring rather than the prompt.
# Sizing vs kitchen4_composition_vmpo_8xh100.yaml: rollout_epoch 8->1, update_epoch 4->2,
#   best_of_n 8->1 (cheap loop). CURRICULUM: composition.max_depth=1 (single-subgoal only,
#   achievable), total_num_envs 256, max_epochs 500, val_check 10.
#
# LAUNCH (8x H100 SXM, single node):
#   sudo sysctl -w kernel.yama.ptrace_scope=0            # collocated CUDA-IPC weight sync
#   export MUJOCO_GL=egl PYOPENGL_PLATFORM=egl
#   export __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
#   bash examples/embodiment/run_embodiment.sh kitchen4_composition_vmpo_fast_nl_e2
# Set the SFT checkpoint path (rollout.model.model_path / actor.model.model_path).
# =============================================================================
defaults:
  - env/kitchen4_ltl_composition_nl@env.train
  - env/kitchen4_compositional_eval_nl_depth1@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all       # collocated on all 8 GPUs (needs ptrace_scope=0)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: neuralsym-vla
    experiment_name: "kitchen4_composition_vmpo_fast_nl_e2"
    logger_backends: ["tensorboard", "wandb"]
    max_eval_videos: 4           # eval rollout mp4s uploaded to wandb per eval

  max_epochs: 500                # depth-1 curriculum: long enough to develop a learning curve
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 10         # eval every 10 epochs (and at train end)
  eval_at_start: True            # epoch-0 (untrained) NL baseline eval
  save_interval: 30              # checkpoint at the end only
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null

algorithm:
  normalize_advantages: True
  normalize_returns: False         # value-target (return) normalization toggle
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1               # tuning: 1 rollout pass / step (was 8) -> ~4-8x faster
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 2                # critic epochs (V-MPO loss is critic-only)  <- control
  adv_type: vmpo
  loss_type: vmpo
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.97

  vmpo:
    eta_init: 1.0
    eta_min: 0.01
    epsilon_eta: 0.1
    lr_eta: 0.01
    safety_mode: fixed
    beta: 0.0
    lambda_init: 0.0
    epsilon_1: 0.0
    alpha_lambda: 0.05
    lambda_max: 100.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 256          # 32 envs / GPU across 8 cards (denser success sampling)
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500   # divisible by num_action_chunks (=10)
    reward_coef: ${algorithm.reward_coef}
    composition:
      max_depth: 1               # CURRICULUM: single-subgoal compositions only (achievable)
  eval:
    total_num_envs: 16           # tuning: small eval (was 48)
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 500
    max_steps_per_rollout_epoch: 500
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 512         # global % (micro_batch_size * actor_world_size) == 0
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/Pi05-LIBERO-SFT"   # <-- set me
    model_type: "openpi"
    add_value_head: True
    add_cost_head: False
    openpi:
      value_after_vlm: False     # value depends on the sampled action -> best-of-N can discriminate
      detach_critic_input: True  # CRITICAL: critic grad must NOT flow into the shared action-expert
                                 # trunk (value_after_vlm=False reads suffix_out) or it corrupts the
                                 # frozen SFT policy. Option A: critic-only V-MPO + eval-time best-of-N.
      best_of_n: 8               # eval-time value-guided selection (the policy-improvement mechanism)
      best_of_n_eta: 1.0
      best_of_n_lambda: 0.0

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
