# Eval env: REAL, multi-subgoal KITCHEN_SCENE4 LIBERO tasks, prompted in NATURAL
# LANGUAGE (prompt_style=nl) so the eval prompt distribution matches NL training. Each
# episode loads a real task's BDDL; its ordered :goal predicates are tracked as subgoals
# and surfaced one-at-a-time as an NL instruction. Success == achieving all goals.
env_type: libero_ltl_composition
task_suite_name: libero_90

total_num_envs: null

auto_reset: True
ignore_terminations: True
max_steps_per_rollout_epoch: 200
max_episode_steps: 200
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: True

use_rel_reward: True
reward_coef: 5.0

composition:
  mode: task_goals       # use each real task's own ordered goal predicates as subgoals
  scene_id: KITCHEN_SCENE4
  min_goals: 2           # keep only compositional tasks (e.g. close-bottom + open-top)
  prompt_style: nl       # match NL training prompt distribution

reset_gripper_open: True
is_eval: True

seed: 0
group_size: 1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/eval

init_params:
  camera_heights: 256
  camera_widths: 256
