# LDBA-based eval env: verifies LDBA construction + reach/avoid subgoal extraction.
# Runs on KITCHEN_SCENE3_turn_on_the_stove_and_put_the_moka_pot_on_it (the one task with
# an LTL spec + prebuilt HOA in ltl_benchmark.task_specs). The LDBA tracks the task's
# sequential formula F(stove_on & F(moka_on_stove)); subgoals are extracted from the LDBA
# trace and surfaced to the VLA in the SAME atomic-proposition prompt format used at
# training (ap_prompt=true), e.g. "Atomic-proposition subgoal to achieve: turn_on(flat_stove_1)".
env_type: libero_ltl
task_suite_name: libero_10

total_num_envs: null

auto_reset: True
ignore_terminations: True
max_steps_per_rollout_epoch: 480
max_episode_steps: 480
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: True

use_rel_reward: True
reward_coef: 5.0

# Lock the eval to the KITCHEN_SCENE3 task that has an LTL spec (scene-prefix filter).
composition:
  scene_id: KITCHEN_SCENE3

# Bridge the LDBA's current reach proposition into the training AP prompt format.
ap_prompt: True

reset_gripper_open: True
is_eval: True

seed: 0
group_size: 1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/eval

init_params:
  camera_heights: 256
  camera_widths: 256
