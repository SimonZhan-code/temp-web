# SAME-SCENE LDBA eval (KITCHEN_SCENE4) — enabled by the LIBERO-Max canonical LTL label
# + prebuilt HOA cache (ltl_monitor/{canonical_task_ltl_labels,hoa_store}.json). Every
# KITCHEN_SCENE4 task now has an LDBA, so eval runs on the SAME scene as training (no
# longer limited to KITCHEN_SCENE3). The LDBA is built from the cache by
# rlinf.envs.libero.ltl_cache and tracked the same way; the current reach subgoal is
# surfaced to the VLA in the training AP-prompt format (ap_prompt=True).
env_type: libero_ltl
task_suite_name: libero_90      # KITCHEN_SCENE4_..._close..._and_open... (2-goal compositional) lives here

total_num_envs: null

auto_reset: True
ignore_terminations: True
max_steps_per_rollout_epoch: 250
max_episode_steps: 250
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: True

use_rel_reward: True
reward_coef: 5.0

# Same scene as training; keep only compositional (>=2 goal) tasks.
composition:
  scene_id: KITCHEN_SCENE4
  min_goals: 2

ap_prompt: True

reset_gripper_open: True
is_eval: True

seed: 0
group_size: 1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/eval

init_params:
  camera_heights: 256
  camera_widths: 256
