# Train env: fixed KITCHEN_SCENE4 scene, per-episode random ORDERED AP composition.
# Loads an auto-generated all-goals BDDL so every goal_alphabet proposition is emitted
# in ltl_label; the env tracks the sampled ordered subgoals directly (no LDBA). Reward
# is reach-only; ltl_cost_rewards is an inert constant-safe signal (cost port open).
env_type: libero_ltl_composition
task_suite_name: libero_90      # KITCHEN_SCENE4 lives here (6 tasks, 50 trials each)

total_num_envs: null

auto_reset: True
ignore_terminations: False
max_steps_per_rollout_epoch: 512
max_episode_steps: 480
use_fixed_reset_state_ids: False   # random scene task/trial each episode (init variety)
use_ordered_reset_state_ids: False

use_rel_reward: True
reward_coef: 5.0

# Lock physics to one scene; vary only the sampled composition + init state.
composition:
  scene_id: KITCHEN_SCENE4
  max_depth: 3        # use compositions_up_to_3.json (132 ordered compositions)
  min_depth: 1
  pool: all           # sample uniformly from all feasible compositions
  # Avoid penalty (reach-avoid shaping): reach reward -= avoid_beta per un-commanded
  # goal-AP toggle (e.g. closing a drawer no subgoal asked to close). 0.0 = reach-only
  # (legacy). Violations are always counted -> env/avoid_violations metric. Do NOT
  # combine avoid_beta > 0 with a V-MPO safety_lambda (double-counted penalty).
  avoid_beta: 0.0
  # NL prompt language: True (default) renders subgoals with the ORIGINAL LIBERO task
  # language ("put the black bowl in the bottom drawer of the cabinet") - in-distribution
  # for the SFT. False = legacy mechanical region names ("...white cabinet bottom region").
  prompt_nl_canonical: True
  # Depth-scaled episode limit: episode cap = steps_per_subgoal x chain depth
  # (0 = legacy fixed max_episode_steps). Grows automatically if the precondition
  # guard expands a chain (hidden composite -> explicit open-then-place).
  steps_per_subgoal: 0

# RLinf LiberoEnv specific settings
reset_gripper_open: True
is_eval: False

seed: 0
group_size: 1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  camera_heights: 256
  camera_widths: 256
