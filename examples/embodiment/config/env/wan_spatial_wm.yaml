# Wan world-model rollout env (client side): the pretrained RLinf-Wan-LIBERO-Spatial
# WM serves as the environment backend — rollouts happen IN IMAGINATION. The heavy
# model runs in tools/wan_spike/wan_rollout_server.py (wanspike venv, file IPC);
# launch one server per env instance (train/eval) with matching ipc_dir:
#   python wan_rollout_server.py --dir /dev/shm/wanroll_train --envs 4 --device cuda:1
#   python wan_rollout_server.py --dir /dev/shm/wanroll_eval  --envs 4 --device cuda:1
env_type: wan_wm

total_num_envs: null

auto_reset: True
ignore_terminations: False
max_steps_per_rollout_epoch: 240   # 30 chunks of 8 (WM chunk length)
max_episode_steps: 240

use_rel_reward: True               # applied SERVER-side by the WM env
reward_coef: 1.0

is_eval: False
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
use_ordered_reset_state_ids: False

wm:
  ipc_dir: /dev/shm/wanroll_train
  ipc_timeout_s: 600
  chunk: 8                         # WM generation chunk == actor.model.num_action_chunks
  state_dim: 8                     # zeros (the WM has no proprio)

video_cfg:
  save_video: False
  info_on_video: False
  video_base_dir: /tmp/wan_video
