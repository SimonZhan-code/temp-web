# Eval env: REAL, multi-subgoal LIBERO tasks (not synthetic compositions), prompted in
# the SAME atomic-proposition format as training (composition.mode=task_goals). Each
# episode loads a real task's own BDDL; its ordered :goal predicates are tracked as AP
# subgoals and surfaced one-at-a-time in the prompt (no NL, no overall-task LTL), so the
# prompt distribution matches training. Success == achieving all of the task's goals.
env_type: libero_ltl_composition
task_suite_name: libero_90

total_num_envs: null

auto_reset: True
ignore_terminations: True
max_steps_per_rollout_epoch: 480
max_episode_steps: 480
use_fixed_reset_state_ids: True
use_ordered_reset_state_ids: True

use_rel_reward: True
reward_coef: 5.0

composition:
  mode: task_goals       # use each real task's own ordered goal predicates as subgoals
  scene_id: KITCHEN_SCENE4
  min_goals: 2           # keep only compositional tasks (e.g. close-bottom + open-top)
  # prompt_preamble / prompt_ap_format default to the training values (kept identical).

reset_gripper_open: True
is_eval: True

seed: 0
group_size: 1

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/eval

init_params:
  camera_heights: 256
  camera_widths: 256
